<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>
    <style>
        #imageGallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }
        img {
            margin: 10px;
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
        <audio id="backgroundMusic" loop>
        <source src="https://www.ialdaiaxiariyay.top/rykxmyas.mp3" type="audio/mpeg">
        </audio>
    <div id="imageGallery"></div>
    <script>
        // 图片的 URL 数组
        let imageUrls = [
            'https://www.ialdaiaxiariyay.top/Firefly/1.jpg',
            'https://www.ialdaiaxiariyay.top/Firefly/2.jpg',
            'https://www.ialdaiaxiariyay.top/Firefly/3.jpg',
            'https://www.ialdaiaxiariyay.top/Firefly/4.jpg',
            'https://www.ialdaiaxiariyay.top/Firefly/5.jpg',
            'https://www.ialdaiaxiariyay.top/Firefly/6.jpg',
            'https://www.ialdaiaxiariyay.top/Firefly/7.jpg',
            'https://www.ialdaiaxiariyay.top/Firefly/8.jpg',
            // 添加更多图片的 URL...
        ];

        for (let url of imageUrls) {
            let img = document.createElement('img');
            img.src = url;
            img.onload = function() {
                document.getElementById('imageGallery').appendChild(img);
            }
        }
        document.getElementById('backgroundMusic').play();
    </script>
</body>
</html>
