            margin-left: 14%;

        }
        .lineClass {
            height: calc(500vh);
            width: 100%;
            margin: 0 auto;

        }

        .move {
            background-color: black;
            width: 30px;
            height: 30px;
            
            border-radius: 15px;
            position: relative;
            left: -10px;
            top: calc(0% - 30px);
            transition: top 1s linear;
        }

        
        /* 创建音符下坠动画 */
        @keyframes down {
            from {
                top: 0;
            } 
            to {
                top: calc(95% - 30px - 15px);
            }
        }
        /* 创建音符跨过判定点动画 */
        @keyframes pass {
            from {
                top: calc(95% - 30px - 15px);
            }
            to {
                top: 100%;
            }
        }
        

        .line .move {
            position: absolute;
            top: 100%;
            transition: top 1s linear;
            animation-name: down,pass;
            animation-duration: 1s,0.2s;
            animation-timing-function: linear;
            animation-delay: 0s,1s;
        }
